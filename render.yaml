services:
  # 1. Frontend Service (Next.js)
  - type: web
    name: two-stage-frontend
    env: node
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_SUPABASE_URL
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
      - key: THAIFIN_BASE_URL
        fromService:
          type: web
          name: two-stage-backend
          property: url

  # 2. Backend Service (Python/Thaifin)
  - type: web
    name: two-stage-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT thaifin_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
